apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-web-application-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: java-web-app
  template:
    metadata:
      name: java-web-application-pod
      labels:
        app: java-web-app
    spec:
      containers:
        - name: java-web-application-container
          image: spring-boot-ci-demo:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-web-app-service
spec:
  type: LoadBalancer
  selector:
    app: java-web-app
  ports:
    - port: 80
      targetPort: 8080
